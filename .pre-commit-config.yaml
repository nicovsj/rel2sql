repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: pretty-format-json
        args: [--autofix]
        # settings.json is JSONC (comments/trailing commas); not strict JSON.
        exclude: ^(MODULE\.bazel\.lock|\.vscode/settings\.json)$

  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: [--version=22.1.1]
      - id: clang-tidy
        args: [--version=22.1.1]
        exclude: ^wasm/
