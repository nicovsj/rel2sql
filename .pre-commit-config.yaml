repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: pretty-format-json
        args: [--autofix]
        # settings.json is JSONC (comments/trailing commas); not strict JSON.
        exclude: ^(MODULE\.bazel\.lock|\.vscode/settings\.json)$

  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      # No --version=… : pin only if every machine/CI uses the same LLVM (pocc checks the first
      # clang-format on PATH). Homebrew/Xcode often ship 21.x while other setups use 22.x.
      # pocc defaults to check-only (diff, no writes); -i applies .clang-format in place.
      - id: clang-format
        args: [-i]
