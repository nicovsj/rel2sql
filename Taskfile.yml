version: "3"

# Load repo-root .env for task tpch:* and other tasks (copy from .env.example).
dotenv: [".env"]

tasks:
  # Core build tasks
  build:
    desc: Build the rel2sql library (//:rel2sql); CLI is //:rel2sql_bin
    cmds:
      - bazel build --config=default //:rel2sql

  build-shared:
    desc: Build the rel2sql shared library
    cmds:
      - bazel build --config=default //:rel2sql_shared

  test:
    desc: Run C++ library tests (bazel test //...)
    cmds:
      - bazel test --config=default //...

  test:lib:
    desc: Alias for task test (native C++ tests only)
    cmds:
      - task: test

  test:all:
    desc: Run all tests
    cmds:
      - task: test
      - task: test:wasm

  test:wasm:
    desc: Run WASM tests
    cmds:
      - task: test:wasm:bindings
      - task: test:wasm:npm
      - task: test:wasm:browser

  test:wasm:bindings:
    desc: "Test WASM bindings contract (requires: bazel build //wasm:rel2sql_wasm_node --config=emcc)"
    cmds:
      - node wasm/tests/bindings_test.mjs

  test:wasm:npm:
    desc: Test npm package build, pack, and consumption
    cmds:
      - node wasm/tests/npm_package_test.mjs

  test:wasm:browser:
    desc: Setup and serve browser test on localhost:8080
    cmds:
      - node wasm/setup_browser_test.mjs
      - echo "Open http://localhost:8080/wasm/tests/browser/test_browser.html in your browser"
      - echo "Press Ctrl+C to stop the server"
      - python3 -m http.server 8080


  # WASM build tasks
  build-wasm:
    desc: Build both Node.js and Browser WASM modules
    cmds:
      - bazel build //wasm:rel2sql_wasm_node //wasm:rel2sql_wasm_browser --config=emcc

  build-wasm-node:
    desc: Build only the Node.js WASM module
    cmds:
      - bazel build //wasm:rel2sql_wasm_node --config=emcc

  build-wasm-browser:
    desc: Build only the Browser WASM module
    cmds:
      - bazel build //wasm:rel2sql_wasm_browser --config=emcc

  # Development tasks
  generate-compile-commands:
    desc: Generate compile_commands.json for clangd (includes generated files)
    cmds:
      - bazel build //... --config=default --keep_going
      - bazel run @hedron_compile_commands//:refresh_all --config=default

  generate-compile-commands-with-wasm:
    desc: Generate compile_commands.json including WASM targets for IntelliSense
    cmds:
      - bazel build //... --config=emcc --keep_going
      - bazel run @hedron_compile_commands//:refresh_all --config=emcc

  parse-antlr:
    desc: Parse a Rel file using ANTLR4 and show GUI with AST
    cmds:
      - antlr4-parse src/grammar/RelParser.g4 src/grammar/RelLexer.g4 program -gui {{.CLI_ARGS}}
    silent: true

  tpch:emit-sql:
    desc: Translate TPC-H Rel to benchmarks/TPCH/out/sql with optimizer (UNOPTIMIZED=1 for -u)
    cmds:
      - bazel build --config=default //:rel2sql_bin
      - scripts/tpch_emit_sql.sh {{.CLI_ARGS}}

  tpch:emit-sql:no-q16:
    desc: Like tpch:emit-sql but skip Q16 (MergeWith on long OR chains can hang)
    env:
      SKIP_QUERIES: "16"
    cmds:
      - bazel build --config=default //:rel2sql_bin
      - scripts/tpch_emit_sql.sh {{.CLI_ARGS}}

  tpch:emit-sql:mvp:
    desc: MVP TPC-H (Q11,Q17,Q18,Q19,Q21) full+solo; use tpch:emit-sql:no-q16 for all queries
    cmds:
      - bazel build --config=default //:rel2sql_bin
      - scripts/tpch_smoke.sh

  tpch:smoke:
    desc: Alias for tpch:emit-sql:mvp
    cmds:
      - task: tpch:emit-sql:mvp

  tpch:pipeline-test:
    desc: Bazel test //benchmarks/TPCH:tpch_pipeline_test (rewrite, translate, DuckDB empty execute)
    cmds:
      - bazel test --config=default //benchmarks/TPCH:tpch_pipeline_test

  tpch:build-db:
    desc: Generate TPC-H DuckDB (default SF 0.01 -> tpch_sf001.duckdb; pass --sf/--output)
    cmds:
      - python3 scripts/tpch_build_duckdb.py {{.CLI_ARGS}}

  tpch:build-db:sf1:
    desc: Generate benchmarks/TPCH/data/tpch_sf100.duckdb (TPC-H SF 1.0)
    cmds:
      - python3 scripts/tpch_build_duckdb.py --sf 1.0

  tpch:run-query:
    desc: Emit SQL for query N, load into TPCH_DUCKDB_PATH, print result rows (default Q18)
    cmds:
      - |
        Q="{{.CLI_ARGS | default "18"}}"
        export TPCH_DUCKDB_PATH="${TPCH_DUCKDB_PATH:-$(pwd)/benchmarks/TPCH/data/tpch_sf001.duckdb}"
        test -f "$TPCH_DUCKDB_PATH" || { echo "Missing $TPCH_DUCKDB_PATH — run: task tpch:build-db" >&2; exit 1; }
        bazel build --config=default //:rel2sql_bin
        scripts/tpch_emit_sql.sh "$Q"
        duckdb "$TPCH_DUCKDB_PATH" < "benchmarks/TPCH/out/sql/q${Q}.sql"
        duckdb "$TPCH_DUCKDB_PATH" -c "SELECT * FROM result LIMIT 20;"

  tpch:run-ref:
    desc: Run reference TPC-H SQL (benchmarks/TPCH/sql/qN.sql) on TPCH_DUCKDB_PATH (default Q18)
    cmds:
      - |
        Q="{{.CLI_ARGS | default "18"}}"
        export TPCH_DUCKDB_PATH="${TPCH_DUCKDB_PATH:-$(pwd)/benchmarks/TPCH/data/tpch_sf001.duckdb}"
        REF="benchmarks/TPCH/sql/q${Q}.sql"
        test -f "$TPCH_DUCKDB_PATH" || { echo "Missing $TPCH_DUCKDB_PATH — run: task tpch:build-db" >&2; exit 1; }
        test -f "$REF" || { echo "Missing $REF" >&2; exit 1; }
        duckdb "$TPCH_DUCKDB_PATH" < "$REF"

  tpch:full-db-run:
    desc: Rewrite, translate, run ref+rel2sql SQL on TPCH_DUCKDB_PATH and diff results (local)
    cmds:
      - bazel build --config=default //benchmarks/TPCH:tpch_runner //:rel2sql_bin
      - scripts/tpch_full_db_run.sh {{.CLI_ARGS}}

  tpch:explain-bench:
    desc: Multi-run EXPLAIN ANALYZE ref vs translated (TPCH_DUCKDB_PATH; see data/README for SF1)
    cmds:
      - |
        export TPCH_DUCKDB_PATH="${TPCH_DUCKDB_PATH:-$(pwd)/benchmarks/TPCH/data/tpch_sf100.duckdb}"
        test -f "$TPCH_DUCKDB_PATH" || { echo "Missing $TPCH_DUCKDB_PATH — run: task tpch:build-db:sf1" >&2; exit 1; }
        ARGS="{{.CLI_ARGS}}"
        if [ -z "$ARGS" ]; then ARGS="18"; fi
        python3 scripts/tpch_explain_bench.py $ARGS

  # Utility tasks
  clean:
    desc: Clean Bazel build artifacts
    cmds:
      - bazel clean

  clean-all:
    desc: Clean Bazel build artifacts and generated files
    cmds:
      - bazel clean
      - rm -f compile_commands.json
      - rm -f wasm/test_wasm.html

  tag:
    desc: Create a new version tag and push it to GitHub (defaults to patch)
    cmds:
      - scripts/tag.sh patch

  tag:major:
    desc: Create a new major version tag and push it to GitHub
    cmds:
      - scripts/tag.sh major

  tag:minor:
    desc: Create a new minor version tag and push it to GitHub
    cmds:
      - scripts/tag.sh minor

  tag:patch:
    desc: Create a new patch version tag and push it to GitHub
    cmds:
      - scripts/tag.sh patch

  vercel:redeploy:
    desc: Trigger a Vercel production redeploy (prompts for confirmation)
    cmds:
      - ./ci/prompt-confirm.sh "Do you want to trigger a Vercel production redeploy?"
      - ./ci/trigger-vercel-redeploy.sh

  default:
    desc: Display available tasks
    cmds:
      - task --list
