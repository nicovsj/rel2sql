name: Publish WASM to GitHub Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Build WASM (Node.js and Browser)
        run: bazel build //wasm:rel2sql_wasm_node //wasm:rel2sql_wasm_browser --config=emcc

      - name: Prepare package dist
        run: |
          set -e
          PKG_DIR=packages/rel2sql-wasm
          DIST=$PKG_DIR/dist
          mkdir -p $DIST

          # Copy Node.js build (main build)
          cp -v bazel-bin/wasm/rel2sql_wasm_node/rel2sql_embindings_node.js $DIST/rel2sql_embindings.js
          cp -v bazel-bin/wasm/rel2sql_wasm_node/rel2sql_embindings_node.wasm $DIST/rel2sql_embindings_node.wasm

          # Copy browser build
          cp -v bazel-bin/wasm/rel2sql_wasm_browser/rel2sql_embindings_browser.js $DIST/rel2sql_embindings_browser.js
          cp -v bazel-bin/wasm/rel2sql_wasm_browser/rel2sql_embindings_browser.wasm $DIST/rel2sql_embindings_browser.wasm

          # Copy loaders
          cp -v $PKG_DIR/loader-node.js $DIST/loader-node.js
          cp -v $PKG_DIR/loader-browser.js $DIST/loader-browser.js

      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Publishing version $TAG"
          jq --arg v "$TAG" '.version=$v' packages/rel2sql-wasm/package.json > packages/rel2sql-wasm/package.json.tmp
          mv packages/rel2sql-wasm/package.json.tmp packages/rel2sql-wasm/package.json

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/rel2sql-wasm
          npm publish --provenance --access public
