name: Publish WASM to GitHub Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Build WASM (Node.js and Browser)
        run: bazel build //wasm:rel2sql_wasm_node //wasm:rel2sql_wasm_browser --config=emcc

      - name: Prepare package dist
        run: ./ci/prepare-package-dist.sh

      - name: Set version from tag
        run: ./ci/set-version-from-tag.sh

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/rel2sql-wasm
          npm publish --provenance --access public

      - name: Trigger Vercel redeploy
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # VERCEL_ORG_ID is optional - only needed for team projects, leave empty for personal projects
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: ./ci/trigger-vercel-redeploy.sh
