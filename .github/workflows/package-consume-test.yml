name: CI - Package Consume Test

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  package-consume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Run npm package test script
        run: node wasm/tests/npm_package_test.mjs
